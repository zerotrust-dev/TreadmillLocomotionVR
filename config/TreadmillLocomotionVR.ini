[General]
Enabled=true
Telemetry=true
DebugLogging=false

[RealityRunner]
; Testing build: close the RealityRunner desktop app before launching Skyrim VR.
DirectApiEnabled=true
ComPort=COM4
ApiPollMs=50

[Output]
; Testing build: sends left-stick forward, plus run input when above threshold.
EnableOutput=true
ForwardMagnitude=1.0

[Intent]
CoastMaxSeconds=0.25
StaleTimeoutMs=450
RunEnterSeconds=0.22
RunExitSeconds=0.60
; Briefly releases forward when leaving run so Skyrim exits run instead
; of latching it while left stick remains held for walking.
RunCancelSeconds=0.12

[Probe]
; Legacy XInput telemetry probe. Ignored while DirectApiEnabled=true.
PatchXInput=false
LogOnly=true
UserIndex=0
LogAllUsers=true

[Analysis]
; These thresholds are owned by this mod. RealityRunner's stored curve is read
; for evidence/logging, but its threshold does not decide Skyrim running.
; Values are normalized from the API joystick magnitude: 0.0 to 1.0.
Deadzone=0.08
RunThreshold=0.70
