[General]
Enabled=true
Telemetry=true
DebugLogging=false

[RealityRunner]
; Testing build: close the RealityRunner desktop app before launching Skyrim VR.
DirectApiEnabled=true
ComPort=COM4
ApiPollMs=50

[Output]
; Testing build: sends left-stick forward, plus sprint when above threshold.
EnableOutput=true
ForwardMagnitude=1.0

[Intent]
CoastMaxSeconds=0.25
StaleTimeoutMs=450
SprintEnterSeconds=0.22
SprintExitSeconds=0.35
; Briefly releases forward when leaving sprint so Skyrim exits sprint instead
; of latching it while left stick remains held for walking.
SprintCancelSeconds=0.12

[Probe]
; Legacy XInput telemetry probe. Ignored while DirectApiEnabled=true.
PatchXInput=false
LogOnly=true
UserIndex=0
LogAllUsers=true

[Analysis]
; These thresholds are owned by this mod. RealityRunner's stored curve is read
; for evidence/logging, but its sprint threshold does not decide Skyrim sprint.
; Values are normalized from the API joystick magnitude: 0.0 to 1.0.
Deadzone=0.08
SprintThreshold=0.75
