[General]
Enabled=false
Telemetry=true
DebugLogging=false

[RealityRunner]
; First direct-API build. Close the RealityRunner desktop app before testing.
DirectApiEnabled=false
ComPort=COM4
ApiPollMs=50

[Output]
; Safety first: this build logs intended output. It does not move Skyrim unless
; EnableOutput is explicitly turned on in a later output test.
EnableOutput=false
ForwardMagnitude=1.0

[Intent]
CoastMaxSeconds=0.25
StaleTimeoutMs=450
SprintEnterSeconds=0.22
SprintExitSeconds=0.35

[Probe]
; Logging-only first build. This never changes Skyrim input.
PatchXInput=true
LogOnly=true
UserIndex=0
LogAllUsers=true

[Analysis]
Deadzone=0.08
WalkThreshold=0.18
RunThreshold=0.55
SprintThreshold=0.75
